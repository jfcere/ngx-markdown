version: 2.1

orbs:
  browser-tools: circleci/browser-tools@2.4.2

jobs:
  build:
    docker:
      - image: cimg/node:24.15-browsers
    steps:
      # Checkout the source code
      - checkout

      # Restore dependencies from cache
      - restore_cache:
          key: dependency-cache-{{ checksum "pnpm-lock.yaml" }}

      # https://pnpm.io/continuous-integration#circleci
      - run:
          name: Install pnpm package manager
          command: |
            sudo npm install --global corepack@latest
            sudo corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store
            pnpm config set minimum-release-age 0

      # Install dependencies
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      # Cache dependencies
      - save_cache:
          key: dependency-cache-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

      # Install headless Chrome
      - browser-tools/install_chrome
      - browser-tools/install_chromedriver

      # Run tests
      - run:
          name: Test
          command: pnpm test --watch=false --code-coverage --no-progress --browsers=ChromeHeadless

      # Store test results and coverage
      - store_artifacts:
          path: test-results.xml
          prefix: tests
      - store_artifacts:
          path: coverage
          prefix: coverage

      # Upload coverage to Coveralls
      - run:
          name: Push coverage artifacts
          command: pnpm coveralls

      # Type-check
      - run:
          name: Type-Check
          command: pnpm type-check:lib

      # Lint
      - run:
          name: Lint
          command: pnpm lint:ci
      - store_artifacts:
          path: eslint.xml
          prefix: lint

      # Build the source code
      - run:
          name: Build lib
          command: pnpm build:lib

      # Build demo for gh-pages
      - run:
          name: Build gh-pages demo
          command: pnpm gh-pages:build

  deploy:
    docker:
      - image: cimg/node:24.15-browsers
    steps:
      # Checkout the source code
      - checkout

      # Restore dependencies from cache
      - restore_cache:
          key: dependency-cache-{{ checksum "pnpm-lock.yaml" }}

      # Install dependencies
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      # Cache dependencies
      - save_cache:
          key: dependency-cache-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

      # Build demo for gh-pages
      - run:
          name: Build gh-pages demo
          command: |
            pnpm gh-pages:build
            pnpm gh-pages:postbuild

      # Deploy demo to GitHub Pages
      - run:
          name: Deploy to gh-pages
          command: pnpm gh-pages:deploy

workflows:
  build_and_deploy:
    # Do not run workflow when the pipeline is triggered from gh-pages branch
    when:
      not:
        equal: [gh-pages, << pipeline.git.branch >>]

    jobs:
      # Build for all branches and all tags
      - build:
          filters:
            tags:
              only: /.*/

      # Deploy only for version tags (vX.Y.Z) on the master branch
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: master
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
